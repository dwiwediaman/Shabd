; Godot 4.5 Android export preset for Shabd.
;
; Keystore values are intentionally blank — they're filled in either:
;   (a) by CI at build time via GitHub secrets, OR
;   (b) by the developer in Godot Editor → Project → Export → Android.
;
; For Play Console upload, recommend Play App Signing:
;   1. Generate a "upload" keystore once (per release-runbook.md)
;   2. Add it to GitHub secrets ANDROID_UPLOAD_KEYSTORE_BASE64 etc.
;   3. CI signs the AAB with the upload key
;   4. Play Console verifies upload-key signature; Google's Play App Signing
;      then re-signs with the production key Google manages.

[preset.0]

name="Android"
platform="Android"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/shabd.aab"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
gradle_build/use_gradle_build=true
gradle_build/gradle_build_directory=""
gradle_build/android_source_template=""
gradle_build/compress_native_libraries=false
gradle_build/export_format=1
gradle_build/min_sdk="24"
gradle_build/target_sdk="34"
architectures/armeabi-v7a=false
architectures/arm64-v8a=true
architectures/x86=false
architectures/x86_64=false
keystore/debug=""
keystore/debug_user=""
keystore/debug_password=""
keystore/release=""
keystore/release_user=""
keystore/release_password=""
version/code=1
version/name="1.0.0"
package/unique_name="in.shabd.game"
package/name="Shabd"
package/signed=true
package/app_category=2
package/retain_data_on_uninstall=true
package/exclude_from_recents=false
package/show_in_android_tv=false
package/show_in_app_library=true
launcher_icons/main_192x192="res://assets/icons/icon.png"
; Adaptive icon slots require 432x432 source images; we only have a
; 192x192 main icon. Leaving these empty makes Godot skip the dimension
; check and fall back to the main icon, which is the canonical pattern
; for projects without dedicated adaptive icon assets.
launcher_icons/adaptive_foreground_432x432=""
launcher_icons/adaptive_background_432x432=""
graphics/opengl_debug=false
xr_features/xr_mode=0
screen/immersive_mode=false
screen/support_small=true
screen/support_normal=true
screen/support_large=true
screen/support_xlarge=true
user_data_backup/allow=false
command_line/extra_args=""
apk_expansion/enable=false
apk_expansion/SALT=""
apk_expansion/public_key=""
permissions/access_network_state=true
permissions/internet=true
