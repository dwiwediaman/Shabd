name: Build Android AAB

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Capacitor Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for git rev-list --count

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Install dependencies
        run: npm ci

      - name: Validate Android config
        run: npm run validate

      - name: Run unit tests with coverage
        run: npm run test:ci

      # MUST run before "Build web app" — Vite reads versionCode out of
      # build.gradle at bundle time and bakes it into __VERSION_CODE__.
      # If we bump after the web build, the JS bundle keeps the stale
      # committed value (e.g. 17) while the AAB manifest correctly gets
      # the new value (e.g. 77), producing an in-app footer that lies
      # about which build the user is running.
      - name: Bump versionCode
        run: |
          GRADLE=android/app/build.gradle
          # Use total git commit count — unique per commit, always increases, no write-back needed
          NEW=$(git rev-list --count HEAD)
          CURRENT=$(grep -oP 'versionCode \K[0-9]+' "$GRADLE")
          sed -i "s/versionCode $CURRENT/versionCode $NEW/" "$GRADLE"
          echo "versionCode: $CURRENT → $NEW (commit count)"
          echo "NEW_VERSION_CODE=$NEW" >> "$GITHUB_ENV"

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_UPLOAD_KEYSTORE_BASE64 not set — build will be unsigned"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$HOME/upload.keystore"
          echo "KEYSTORE_PATH=$HOME/upload.keystore" >> "$GITHUB_ENV"
          echo "Keystore decoded: $(stat -c %s $HOME/upload.keystore) bytes"

      - name: Build signed AAB
        env:
          KEY_ALIAS:    ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          cd android
          if [ -n "$KEYSTORE_PATH" ]; then
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
              -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew bundleRelease
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: shabd-v${{ env.NEW_VERSION_CODE }}-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Report AAB size
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          if [ -f "$AAB" ]; then
            SIZE=$(du -sh "$AAB" | cut -f1)
            echo "::notice::AAB size = $SIZE (target <50 MB)"
          fi
