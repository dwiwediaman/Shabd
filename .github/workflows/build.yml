name: Build Android AAB

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'research/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.5-stable
  ANDROID_PLATFORM: android-34
  ANDROID_BUILD_TOOLS: 34.0.0

jobs:
  build:
    name: Build Godot Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Godot binary + templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /opt/godot
            /opt/godot-templates
          key: godot-${{ env.GODOT_VERSION }}

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          sudo mkdir -p /opt/godot /opt/godot-templates
          ZIP="Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          TPZ="Godot_v${GODOT_VERSION}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${ZIP}" -O /tmp/godot.zip
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${TPZ}" -O /tmp/templates.tpz
          sudo unzip -q /tmp/godot.zip -d /opt/godot
          sudo mv "/opt/godot/Godot_v${GODOT_VERSION}_linux.x86_64" /opt/godot/godot
          sudo chmod +x /opt/godot/godot
          sudo unzip -q /tmp/templates.tpz -d /opt/godot-templates

      - name: Link export templates to Godot expected path
        run: |
          # Godot's release tag uses '-stable' but the templates directory
          # name uses '.stable'. Convert: 4.5-stable -> 4.5.stable.
          TEMPLATES_DIR_NAME="${GODOT_VERSION//-/.}"
          mkdir -p "$HOME/.local/share/godot/export_templates"
          ln -sf /opt/godot-templates/templates "$HOME/.local/share/godot/export_templates/${TEMPLATES_DIR_NAME}"
          echo "Templates linked at: $HOME/.local/share/godot/export_templates/${TEMPLATES_DIR_NAME}"
          ls -la "$HOME/.local/share/godot/export_templates/${TEMPLATES_DIR_NAME}/" | head -10

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;${{ env.ANDROID_PLATFORM }} build-tools;${{ env.ANDROID_BUILD_TOOLS }} platform-tools'

      - name: Configure Godot Android paths
        run: |
          mkdir -p "$HOME/.config/godot"
          # Godot 4.5 reads editor_settings-4.5.tres, not -4.tres. Verbose log
          # showed Godot ignoring our -4.tres file and loading defaults (no
          # Android SDK / JDK path) — silent failure during export validation.
          cat > "$HOME/.config/godot/editor_settings-4.5.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          EOF
          echo "Editor settings written:"
          cat "$HOME/.config/godot/editor_settings-4.5.tres"

      - name: Verify project loads (headless import)
        run: |
          /opt/godot/godot --headless --path . --import 2>&1 | tail -50 || true
          # Second pass — Godot's import system can defer work to a second run.
          /opt/godot/godot --headless --path . --import 2>&1 | tail -20 || true

      - name: Run unit tests
        run: |
          if [ -f test/test_runner.gd ]; then
            /opt/godot/godot --headless --path . --script res://test/test_runner.gd
          else
            echo "No test runner; skipping."
          fi

      - name: Install Android build template
        run: |
          # Godot's gradle-build mode requires the template extracted into android/build/.
          # Normally done via Editor → Project → Install Android Build Template; in CI
          # we extract android_source.zip from the templates package directly.
          mkdir -p android/build
          TEMPLATE_ZIP="/opt/godot-templates/templates/android_source.zip"
          if [ ! -f "$TEMPLATE_ZIP" ]; then
            echo "::error::android_source.zip not found at $TEMPLATE_ZIP"
            ls -la /opt/godot-templates/templates/ | head -20
            exit 1
          fi
          unzip -oq "$TEMPLATE_ZIP" -d android/build/
          # Critical: Godot's "Install Android Build Template" command in the
          # editor does NOT just unzip — it also creates an empty .gdignore
          # marker file. Without it, has_valid_export_configuration() returns
          # false silently (no specific error message pushed to error array).
          touch android/build/.gdignore
          echo "Android build template installed:"
          ls -la android/build/ | head -15

      - name: Decode keystore and verify
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_UPLOAD_KEYSTORE_BASE64 not set — UNSIGNED AAB (not uploadable to Play Console)"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$HOME/upload.keystore"
          if [ ! -s "$HOME/upload.keystore" ]; then
            echo "::error::Keystore file empty after base64 decode"
            exit 1
          fi
          echo "Keystore decoded — size: $(stat -c %s "$HOME/upload.keystore") bytes"
          # Verify keystore is readable with the supplied password
          keytool -list -keystore "$HOME/upload.keystore" -storepass "$KEY_PASSWORD" 2>&1 | head -5
          # Expose path to subsequent steps via $GITHUB_ENV (canonical pattern).
          # Godot 4.4+ reads GODOT_ANDROID_KEYSTORE_RELEASE_PATH at export time and
          # auto-enables release signing — no sed-injection of export_presets.cfg needed.
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=$HOME/upload.keystore" >> "$GITHUB_ENV"
          echo "Keystore verified — Godot env vars set for export step."

      - name: Diagnose export configuration (dump validation errors)
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          set -o pipefail
          # The diag script extends SceneTree (not EditorScript) so `--script`
          # auto-runs its _init(). No --editor / --quit-after needed; the
          # script self-quits via quit().
          /opt/godot/godot --headless --path . \
            --script res://tools/dump_export_errors.gd 2>&1 \
            | tee /tmp/godot-diag.log || true
          echo "----- DIAG SUMMARY -----"
          grep -E '^DIAG' /tmp/godot-diag.log || echo "(no DIAG lines — script did not run)"
          echo "------------------------"
          # Non-fatal: we want the diag output even if validation fails;
          # the actual export step below still gates the job.

      - name: Probe with --export-debug (signing-free bisect)
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          set -o pipefail
          mkdir -p build
          # Debug export skips keystore validation. If this passes but release
          # below fails, the bug is in signing config. If this also fails,
          # the bug is in template/manifest/project validation (see DIAG above).
          /opt/godot/godot --headless --verbose --path . \
            --export-debug "Android" build/shabd-debug.apk 2>&1 \
            | tee /tmp/godot-debug-export.log | tail -100 || true
          if [ -f build/shabd-debug.apk ]; then
            echo "::notice::Debug APK built — signing/keystore is the cause if release fails"
          else
            echo "::notice::Debug APK ALSO failed — bug is in template/manifest/project, see DIAG output"
          fi

      - name: Export Android AAB
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          set -o pipefail
          mkdir -p build
          # Echo (sanitized) state so failures have diagnostic context.
          echo "=== Pre-export state ==="
          echo "Keystore env path: ${GODOT_ANDROID_KEYSTORE_RELEASE_PATH:-<unset>}"
          echo "Keystore alias: ${GODOT_ANDROID_KEYSTORE_RELEASE_USER:-<unset>}"
          echo "Keystore password: $([ -n "$GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD" ] && echo '<set>' || echo '<unset>')"
          echo "android/build/ contents:"
          ls android/build/ 2>&1 | head -10
          echo "Export preset (keystore + signing fields):"
          grep -E '^(keystore|package/signed|launcher_icons|version|package/(unique|name))' export_presets.cfg
          echo "=== Running export ==="
          # Save full log to file; tail to GHA console for readability.
          # set -o pipefail ensures Godot's exit code propagates through the pipe.
          /opt/godot/godot --headless --verbose --path . --export-release "Android" build/shabd.aab 2>&1 \
            | tee /tmp/godot-export.log | tail -200
          GODOT_EXIT=${PIPESTATUS[0]}
          echo "=== Export complete: godot exit=$GODOT_EXIT ==="
          if [ ! -f build/shabd.aab ]; then
            echo "::error::AAB was not produced at build/shabd.aab — export silently failed"
            echo "=== Full Godot log ==="
            cat /tmp/godot-export.log
            exit 1
          fi
          AAB_SIZE=$(stat -c %s build/shabd.aab)
          echo "AAB built successfully: $AAB_SIZE bytes"
          if [ "$GODOT_EXIT" -ne 0 ]; then
            echo "::warning::Godot exited with $GODOT_EXIT but AAB was created"
          fi

      - name: Upload AAB artifact
        if: hashFiles('build/shabd.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: shabd-aab-${{ github.sha }}
          path: build/shabd.aab
          retention-days: 14

      - name: Report APK size budget
        if: hashFiles('build/shabd.aab') != ''
        run: |
          SIZE_BYTES=$(stat -c %s build/shabd.aab)
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1024 / 1024" | bc)
          echo "AAB size: ${SIZE_MB} MB"
          echo "::notice::AAB size = ${SIZE_MB} MB (target <50 MB)"
