name: Build Android AAB

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'research/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.5-stable
  ANDROID_PLATFORM: android-34
  ANDROID_BUILD_TOOLS: 34.0.0

jobs:
  build:
    name: Build Godot Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Godot binary + templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /opt/godot
            /opt/godot-templates
          key: godot-${{ env.GODOT_VERSION }}

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          sudo mkdir -p /opt/godot /opt/godot-templates
          ZIP="Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          TPZ="Godot_v${GODOT_VERSION}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${ZIP}" -O /tmp/godot.zip
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${TPZ}" -O /tmp/templates.tpz
          sudo unzip -q /tmp/godot.zip -d /opt/godot
          sudo mv "/opt/godot/Godot_v${GODOT_VERSION}_linux.x86_64" /opt/godot/godot
          sudo chmod +x /opt/godot/godot
          sudo unzip -q /tmp/templates.tpz -d /opt/godot-templates

      - name: Link export templates to Godot expected path
        run: |
          # Godot's release tag uses '-stable' but the templates directory
          # name uses '.stable'. Convert: 4.5-stable -> 4.5.stable.
          TEMPLATES_DIR_NAME="${GODOT_VERSION//-/.}"
          mkdir -p "$HOME/.local/share/godot/export_templates"
          ln -sf /opt/godot-templates/templates "$HOME/.local/share/godot/export_templates/${TEMPLATES_DIR_NAME}"
          echo "Templates linked at: $HOME/.local/share/godot/export_templates/${TEMPLATES_DIR_NAME}"
          ls -la "$HOME/.local/share/godot/export_templates/${TEMPLATES_DIR_NAME}/" | head -10

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;${{ env.ANDROID_PLATFORM }} build-tools;${{ env.ANDROID_BUILD_TOOLS }} platform-tools'

      - name: Configure Godot Android paths
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          EOF

      - name: Verify project loads (headless import)
        run: |
          /opt/godot/godot --headless --path . --import 2>&1 | tail -50 || true
          # Second pass — Godot's import system can defer work to a second run.
          /opt/godot/godot --headless --path . --import 2>&1 | tail -20 || true

      - name: Run unit tests
        run: |
          if [ -f test/test_runner.gd ]; then
            /opt/godot/godot --headless --path . --script res://test/test_runner.gd
          else
            echo "No test runner; skipping."
          fi

      - name: Install Android build template
        run: |
          # Godot's gradle-build mode requires the template extracted into android/build/.
          # Normally done via Editor → Project → Install Android Build Template; in CI
          # we extract android_source.zip from the templates package directly.
          mkdir -p android/build
          TEMPLATE_ZIP="/opt/godot-templates/templates/android_source.zip"
          if [ ! -f "$TEMPLATE_ZIP" ]; then
            echo "::error::android_source.zip not found at $TEMPLATE_ZIP"
            ls -la /opt/godot-templates/templates/ | head -20
            exit 1
          fi
          unzip -oq "$TEMPLATE_ZIP" -d android/build/
          echo "Android build template installed:"
          ls android/build/ | head -10

      - name: Decode and inject upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_UPLOAD_KEYSTORE_BASE64 not set — building UNSIGNED AAB (not uploadable to Play Console)"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$HOME/upload.keystore"
          # Inject keystore path + credentials into export_presets.cfg.
          # Using | as sed delimiter so file paths with / don't need escaping.
          # NOTE: passwords with literal | will break this — keep keystore passwords
          # alphanumeric + safe symbols.
          sed -i "s|keystore/release=\"\"|keystore/release=\"$HOME/upload.keystore\"|" export_presets.cfg
          sed -i "s|keystore/release_user=\"\"|keystore/release_user=\"$KEY_ALIAS\"|" export_presets.cfg
          sed -i "s|keystore/release_password=\"\"|keystore/release_password=\"$KEY_PASSWORD\"|" export_presets.cfg
          sed -i "s|package/signed=false|package/signed=true|" export_presets.cfg
          echo "Keystore wired for release signing."

      - name: Export Android AAB
        run: |
          mkdir -p build
          /opt/godot/godot --headless --path . --export-release "Android" build/shabd.aab

      - name: Upload AAB artifact
        if: hashFiles('build/shabd.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: shabd-aab-${{ github.sha }}
          path: build/shabd.aab
          retention-days: 14

      - name: Report APK size budget
        if: hashFiles('build/shabd.aab') != ''
        run: |
          SIZE_BYTES=$(stat -c %s build/shabd.aab)
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1024 / 1024" | bc)
          echo "AAB size: ${SIZE_MB} MB"
          echo "::notice::AAB size = ${SIZE_MB} MB (target <50 MB)"
