name: Publish to Play Console

# Manual only. Build + upload a fresh AAB to a Play Console track.
#
# Setup (one-time, outside CI):
#   1. Google Cloud → create a service account, download its JSON key.
#   2. Play Console → Setup → API access → link that service account
#      and grant "Release manager" on in.shabd.game.
#   3. GitHub → repo secrets:
#        PLAY_SERVICE_ACCOUNT_JSON          ← contents of the JSON key
#        ANDROID_UPLOAD_KEYSTORE_BASE64     ← already used by build.yml
#        ANDROID_UPLOAD_KEY_ALIAS           ← already used by build.yml
#        ANDROID_UPLOAD_KEY_PASSWORD        ← already used by build.yml
#
# Trigger (any of these):
#   gh workflow run publish.yml --ref capacitor-app \
#     -f track="internal" \
#     -f status="completed" \
#     -f release_notes="vc92 — bug fixes..."
#
#   or via GitHub UI: Actions → Publish to Play Console → Run workflow

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Console track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha       # legacy name for closed testing
          - beta        # open testing
          - production
      status:
        description: "Release status"
        required: true
        default: "draft"
        type: choice
        options:
          - draft       # stages on the track but doesn't roll out
          - inProgress  # active rollout (use with userFraction for staged)
          - completed   # full release to the track
      release_notes:
        description: "What's new (shown to testers / users)"
        required: true
        type: string

jobs:
  publish:
    name: Build + upload AAB
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for git rev-list --count

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Install dependencies
        run: npm ci

      - name: Validate Android config
        run: npm run validate

      - name: Run unit tests with coverage
        run: npm run test:ci

      # MUST run before "Build web app" — Vite reads versionCode out of
      # build.gradle at bundle time and bakes it into __VERSION_CODE__.
      - name: Bump versionCode
        run: |
          GRADLE=android/app/build.gradle
          NEW=$(git rev-list --count HEAD)
          CURRENT=$(grep -oP 'versionCode \K[0-9]+' "$GRADLE")
          sed -i "s/versionCode $CURRENT/versionCode $NEW/" "$GRADLE"
          echo "versionCode: $CURRENT → $NEW (commit count)"
          echo "NEW_VERSION_CODE=$NEW" >> "$GITHUB_ENV"

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_UPLOAD_KEYSTORE_BASE64 secret is required for a Play Console upload."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$HOME/upload.keystore"
          echo "KEYSTORE_PATH=$HOME/upload.keystore" >> "$GITHUB_ENV"

      - name: Build signed AAB
        env:
          KEY_ALIAS:      ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Stage release notes
        # Play Console accepts per-locale "whatsnew" files. We use en-US +
        # en-IN since the listing is English; Hindi UI tester base reads the
        # English notes fine. Cap at 500 chars (Play limit per locale).
        run: |
          mkdir -p whatsnew
          NOTES=$(printf '%s' "${{ inputs.release_notes }}" | head -c 500)
          printf '%s' "$NOTES" > whatsnew/whatsnew-en-US
          printf '%s' "$NOTES" > whatsnew/whatsnew-en-IN
          echo "Release notes (${#NOTES} chars) staged for en-US + en-IN."

      - name: Upload to Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: in.shabd.game
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: ${{ inputs.status }}
          whatsNewDirectory: whatsnew
          # Don't change in-app updates priority by default; can be set per-call.
          # inAppUpdatePriority: 0

      - name: Summary
        run: |
          echo "### Publish summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| versionCode | $NEW_VERSION_CODE |" >> $GITHUB_STEP_SUMMARY
          echo "| track | ${{ inputs.track }} |" >> $GITHUB_STEP_SUMMARY
          echo "| status | ${{ inputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| package | in.shabd.game |" >> $GITHUB_STEP_SUMMARY
