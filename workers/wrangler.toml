name = "shabd-api"
main = "src/index.js"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# D1 database binding — created via `npm run db:create` then paste the
# returned database_id below. Until then this section is just a placeholder.
[[d1_databases]]
binding       = "DB"
database_name = "shabd-db"
database_id   = "524986b4-a85a-4c78-aa73-e142f9bfa93b"
migrations_dir = "migrations"

# Public vars (non-secret). Secrets go via `wrangler secret put`.
[vars]
APP_ENV          = "production"
GOOGLE_CLIENT_ID = "345143844571-bc5hflbdgue0qphais119t4fob9ounik.apps.googleusercontent.com"
# Secrets to set later with wrangler secret put:
#   SESSION_JWT_SECRET   (random 32+ char string)

# Rate limit for the public /squads/preview endpoint (vc78 / C2.2).
# 30 req/min/IP — generous for legit landing-page traffic, kills brute-force
# enumeration of invite codes from a single IP.
[[unsafe.bindings]]
name          = "RL_PREVIEW"
type          = "ratelimit"
namespace_id  = "1001"
simple        = { limit = 30, period = 60 }
