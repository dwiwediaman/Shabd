name = "shabd-api"
main = "src/index.js"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# D1 database binding — created via `npm run db:create` then paste the
# returned database_id below. Until then this section is just a placeholder.
[[d1_databases]]
binding       = "DB"
database_name = "shabd-db"
database_id   = "524986b4-a85a-4c78-aa73-e142f9bfa93b"
migrations_dir = "migrations"

# Public vars (non-secret). Secrets go via `wrangler secret put`.
[vars]
APP_ENV          = "production"
GOOGLE_CLIENT_ID = "345143844571-bc5hflbdgue0qphais119t4fob9ounik.apps.googleusercontent.com"
# Secrets to set later with wrangler secret put:
#   SESSION_JWT_SECRET   (random 32+ char string)

# Rate limit for the public /squads/preview endpoint (vc78 / C2.2).
# 30 req/min/IP — generous for legit landing-page traffic, kills brute-force
# enumeration of invite codes from a single IP.
[[unsafe.bindings]]
name          = "RL_PREVIEW"
type          = "ratelimit"
namespace_id  = "1001"
simple        = { limit = 30, period = 60 }

# Rate limits for authenticated/sensitive endpoints (vc79 / H1).
# All are eventually consistent (Cloudflare's approximate semantics) but
# raise the cost of abuse significantly.

# /auth/google — 10 sign-ins/min/IP. Sign-in is rare per-user; this just
# prevents one IP from flooding user-creation.
[[unsafe.bindings]]
name          = "RL_AUTH"
type          = "ratelimit"
namespace_id  = "1002"
simple        = { limit = 10, period = 60 }

# /sync/push — 30 pushes/min/user. Even an active player typically pushes
# once per minute or two; 30/min comfortably above legit ceiling.
[[unsafe.bindings]]
name          = "RL_PUSH"
type          = "ratelimit"
namespace_id  = "1003"
simple        = { limit = 30, period = 60 }

# /squads/create — 5 creates/min/user. Per-user cap (MAX_SQUADS_PER_USER=10)
# already exists; this just stops a rapid-fire flood scenario.
[[unsafe.bindings]]
name          = "RL_CREATE"
type          = "ratelimit"
namespace_id  = "1004"
simple        = { limit = 5, period = 60 }
